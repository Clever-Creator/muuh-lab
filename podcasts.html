<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PODCASTS | MUUH LAB</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        body { background: #080808; color: white; font-family: 'Poppins', sans-serif; }
        
        .podcast-hero {
            height: 35vh;
            background: linear-gradient(to bottom, rgba(212, 175, 55, 0.2), #080808), url('https://images.unsplash.com/photo-1590602847861-f357a9332bbc?auto=format&fit=crop&q=80&w=1000');
            background-size: cover;
            background-position: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .podcast-hero h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2.8rem;
            color: #D4AF37;
            margin-bottom: 5px;
        }

        .podcast-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            padding: 30px 5%;
        }

        .podcast-card {
            background: #121212;
            border-radius: 12px;
            padding: 15px;
            border: 1px solid #1a1a1a;
            transition: 0.3s;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .podcast-card:hover {
            background: #1a1a1a;
            border-color: #D4AF37;
            transform: scale(1.02);
        }

        .podcast-cover {
            width: 100%;
            aspect-ratio: 1/1;
            object-fit: cover;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .podcast-details h3 {
            font-size: 1.1rem;
            color: #fff;
            margin-bottom: 5px;
        }

        .podcast-details p {
            font-size: 0.85rem;
            color: #aaa;
            line-height: 1.4;
            height: 40px;
            overflow: hidden;
        }

        .play-podcast-btn {
            background: #D4AF37;
            color: black;
            text-align: center;
            padding: 10px;
            border-radius: 6px;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            margin-top: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        /* Bottom Nav */
        .bottom-nav {
            position: fixed; bottom: 0; left: 0; width: 100%;
            background: rgba(0,0,0,0.9); backdrop-filter: blur(15px);
            display: flex; justify-content: space-around; padding: 12px 0;
            border-top: 1px solid #1a1a1a; z-index: 1000;
        }
        .nav-item { color: #888; text-decoration: none; font-size: 10px; text-align: center; }
        .nav-item.active { color: #D4AF37; }
    </style>
</head>
<body>

    <header class="podcast-hero">
        <h1>MUUH PODCAST</h1>
        <p>Artist Voice And Lifestyle</p>
    </header>

    <main style="padding-bottom: 100px;">
        <div class="podcast-grid" id="podcast-list">
            <p style="text-align: center; grid-column: 1/-1;">Loading Episodes...</p>
        </div>
    </main>

  <nav class="bottom-nav">
    <a href="index.html" class="nav-item">
        <span>🏠</span>
        <p>Home</p>
    </a>
    <a href="actors.html" class="nav-item">
        <span>🎭</span>
        <p>Actors</p>
    </a>
    <a href="podcasts.html" class="nav-item">
        <span>🎙️</span>
        <p>Podcasts</p>
    </a>
    <a href="admin.html" class="nav-item">
        <span>⚙️</span>
        <p>Admin</p>
    </a>
</nav>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAlbRzPaXf4Tw_f9oFM39Ca4Un0GsyvFeI",
            authDomain: "muul-lab.firebaseapp.com",
            databaseURL: "https://muul-lab-default-rtdb.firebaseio.com",
            projectId: "muul-lab",
            storageBucket: "muul-lab.firebasestorage.app",
            messagingSenderId: "289981524698",
            appId: "1:289981524698:web:f58c296609ca0bd4d253e3"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        function checkAdmin() {
            let pass = prompt("Ingiza Password ya MUUH LAB Admin:");
            if (pass === "CleverDev") { window.location.href = "admin.html"; }
        }

        // Vuta Podcast kutoka node ya 'podcasts'
        database.ref('podcasts').on('value', (snapshot) => {
            const podcasts = snapshot.val();
            const grid = document.getElementById('podcast-list');
            grid.innerHTML = '';

            if(!podcasts) {
                grid.innerHTML = '<p style="text-align:center; grid-column:1/-1;">Bado hakuna podcast zilizopakiwa.</p>';
                return;
            }

            for (let id in podcasts) {
                const pod = podcasts[id];
                grid.innerHTML += `
                    <div class="podcast-card">
                        <img src="${pod.coverUrl}" class="podcast-cover" alt="${pod.title}">
                        <div class="podcast-details">
                            <h3>${pod.title}</h3>
                            <p>${pod.description || 'Sikiliza kipindi hiki kutoka MUUH Lab.'}</p>
                        </div>
                        <a href="player.html?id=${id}&type=podcast" class="play-podcast-btn">
                            ▶️ SIKILIZA SASA
                        </a>
                    </div>
                `;
            }
        });
        <div id="manage" class="tab-content">
    <h3>Dhibiti Content Zako</h3>
    <div id="manage-list" style="display: grid; gap: 15px;">
        <p style="color:#888;">Inapakia data...</p>
    </div>
</div>
    </script>
</body>
</html>
