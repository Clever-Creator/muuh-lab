<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ACTORS | MUUH LAB</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #D4AF37; --dark: #050505; }
        body { background: var(--dark); color: white; font-family: 'Poppins', sans-serif; margin: 0; padding: 20px; }
        
        header { text-align: center; margin-bottom: 40px; padding-top: 20px; }
        h1 { font-family: 'Playfair Display', serif; color: var(--gold); font-size: 2.5rem; margin: 0; }
        p.subtitle { color: #888; font-size: 0.9rem; letter-spacing: 2px; }

        /* SEARCH BAR */
        .search-container { max-width: 500px; margin: 0 auto 30px auto; }
        #actorSearch { 
            width: 100%; padding: 12px 20px; border-radius: 30px; border: 1px solid #222; 
            background: #111; color: white; outline: none; transition: 0.3s;
        }
        #actorSearch:focus { border-color: var(--gold); box-shadow: 0 0 10px rgba(212, 175, 55, 0.2); }

        /* GRID SYSTEM */
        .actors-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); 
            gap: 20px; max-width: 1000px; margin: auto; 
        }

        /* ACTOR CARD */
        .actor-card { 
            background: #111; border-radius: 15px; overflow: hidden; 
            transition: 0.4s; cursor: pointer; border: 1px solid #1a1a1a;
            position: relative;
        }
        .actor-card:hover { transform: translateY(-10px); border-color: var(--gold); }
        
        .actor-img { width: 100%; height: 240px; object-fit: cover; transition: 0.5s; }
        .actor-card:hover .actor-img { filter: brightness(0.7) scale(1.1); }

        .actor-info { padding: 15px; text-align: center; }
        .actor-name { margin: 0; font-size: 1rem; color: #fff; font-weight: 600; }
        .actor-role { margin: 5px 0; font-size: 0.75rem; color: var(--gold); text-transform: uppercase; letter-spacing: 1px; }
        .actor-nick { font-size: 0.8rem; color: #666; font-style: italic; }

        /* LOADING SPINNER */
        #loading { text-align: center; padding: 50px; color: var(--gold); }

        /* BOTTOM NAV (Kama unayo kwenye Index) */
        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; background: rgba(0,0,0,0.9); display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #222; z-index: 100; }
        .nav-item { color: #888; text-decoration: none; font-size: 12px; }
        .nav-item.active { color: var(--gold); }
    </style>
</head>
<body>

    <header>
        <h1>MUUH TALENTS</h1>
        <p class="subtitle">THE FACES OF MUUH SCRIPT & FILM LAB</p>
    </header>

    <div class="search-container">
        <input type="text" id="actorSearch" placeholder="Tafuta msanii..." onkeyup="filterActors()">
    </div>

    <div id="loading">Inapakia Wasanii...</div>
    <div class="actors-grid" id="actors-grid"></div>

 <nav class="bottom-nav">
    <a href="index.html" class="nav-item">
        <span>🏠</span>
        <p>Home</p>
    </a>
    <a href="actors.html" class="nav-item">
        <span>🎭</span>
        <p>Actors</p>
    </a>
    <a href="podcasts.html" class="nav-item">
        <span>🎙️</span>
        <p>Podcasts</p>
    </a>
    <a href="admin.html" class="nav-item">
        <span>⚙️</span>
        <p>Admin</p>
    </a>
</nav>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script>
        // CONFIG YAKO YA FIREBASE
        const firebaseConfig = {
            apiKey: "AIzaSyAlbRzPaXf4Tw_f9oFM39Ca4Un0GsyvFeI",
            authDomain: "muul-lab.firebaseapp.com",
            databaseURL: "https://muul-lab-default-rtdb.firebaseio.com",
            projectId: "muul-lab",
            storageBucket: "muul-lab.firebasestorage.app",
            messagingSenderId: "289981524698",
            appId: "1:289981524698:web:f58c296609ca0bd4d253e3"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        const grid = document.getElementById('actors-grid');
        const loading = document.getElementById('loading');

        // VUTA DATA KUTOKA FIREBASE
        database.ref('actors').on('value', (snapshot) => {
            loading.style.display = 'none';
            grid.innerHTML = "";
            
            if (snapshot.exists()) {
                snapshot.forEach((child) => {
                    const id = child.key;
                    const actor = child.val();
                    
                    // Fallback kwa data zinazoweza kukosa (kuzuia undefined)
                    const name = actor.name || "Anonymous";
                    const role = actor.role || "Talent";
                    const nick = actor.nickname || "";
                    const img = actor.imageUrl || "https://via.placeholder.com/300x400?text=MUUH+LAB";

                    grid.innerHTML += `
                        <div class="actor-card" onclick="location.href='profile.html?id=${id}'">
                            <img src="${img}" class="actor-img" alt="${name}">
                            <div class="actor-info">
                                <h3 class="actor-name">${name}</h3>
                                <p class="actor-role">${role}</p>
                                <span class="actor-nick">${nick ? '"' + nick + '"' : ''}</span>
                            </div>
                        </div>
                    `;
                });
            } else {
                grid.innerHTML = "<p style='grid-column: 1/-1; text-align:center; color:#666;'>Bado hakuna wasanii waliosajiliwa.</p>";
            }
        });

        // SEARCH FUNCTION
        function filterActors() {
            let input = document.getElementById('actorSearch').value.toLowerCase();
            let cards = document.getElementsByClassName('actor-card');
            
            for (let i = 0; i < cards.length; i++) {
                let name = cards[i].querySelector('.actor-name').innerText.toLowerCase();
                let nick = cards[i].querySelector('.actor-nick').innerText.toLowerCase();
                if (name.includes(input) || nick.includes(input)) {
                    cards[i].style.display = "";
                } else {
                    cards[i].style.display = "none";
                }
            }
        }
    </script>
</body>
</html>
