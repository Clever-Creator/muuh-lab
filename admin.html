<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADMIN DASHBOARD | MUUH LAB</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #D4AF37; --dark: #0a0a0a; --red: #ff4444; }
        body { font-family: 'Poppins', sans-serif; background: var(--dark); color: white; margin: 0; padding: 20px; }
        .admin-container { max-width: 800px; margin: auto; }
        h1 { color: var(--gold); text-align: center; font-size: 1.5rem; margin-bottom: 30px; }

        /* TAB SYSTEM */
        .tabs { 
            display: flex; 
            gap: 12px; 
            margin-bottom: 30px; 
            overflow-x: auto; 
            padding: 10px 5px;
            scrollbar-width: none;
            -ms-overflow-style: none;
            scroll-behavior: smooth;
            border-bottom: 1px solid #222;
        }
        .tabs::-webkit-scrollbar { display: none; }

        .tab-btn { 
            background: #1a1a1a; 
            color: #888; 
            border: 1px solid #333; 
            padding: 12px 25px; 
            border-radius: 8px; 
            cursor: pointer; 
            white-space: nowrap;
            font-size: 0.9rem;
            transition: 0.3s;
            flex-shrink: 0;
        }

        .tab-btn.active { 
            background: var(--gold); 
            color: black; 
            font-weight: 600; 
            border-color: var(--gold);
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.3);
        }
        .tab-content { display: none; background: #151515; padding: 20px; border-radius: 10px; border: 1px solid #222; }
        .tab-content.active { display: block; }

        /* FORM STYLING */
        .form-group { margin-bottom: 15px; }
        label { display: block; font-size: 0.8rem; color: #aaa; margin-bottom: 5px; }
        input, select, textarea { width: 100%; padding: 12px; border-radius: 5px; border: 1px solid #333; background: #000; color: white; box-sizing: border-box; }
        input:focus, textarea:focus { border-color: var(--gold); outline: none; }
        .submit-btn { width: 100%; padding: 15px; background: var(--gold); border: none; border-radius: 5px; color: black; font-weight: 600; cursor: pointer; margin-top: 10px; }
        
        .manage-item { background:#222; padding:15px; border-radius:8px; display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; border-left: 4px solid var(--gold); }
        .del-btn { background: var(--red); color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .back-home { display: block; text-align: center; color: var(--gold); margin-top: 20px; text-decoration: none; font-size: 0.9rem; }
    </style>
</head>
<body>
<div id="admin-login" style="position:fixed; top:0; left:0; width:100%; height:100%; background:var(--dark); z-index:9999; display:flex; justify-content:center; align-items:center; flex-direction:column;">
    <h2 style="color:var(--gold);">MUUH LAB ACCESS</h2>
    <input type="password" id="admin-pass" placeholder="Ingiza Password" style="width:250px; margin-bottom:15px; text-align:center;">
    <button class="submit-btn" style="width:250px;" onclick="checkPass()">ENTER DASHBOARD</button>
</div>

<script>
    function checkPass() {
        const pass = document.getElementById('admin-pass').value;
        if(pass === "Goblin") { // Hapa ndio password yako, unaweza kuibadilisha
            document.getElementById('admin-login').style.display = 'none';
        } else {
            alert("Password Sio Sahihi! Jaribu tena.");
        }
    }
</script>
<div class="admin-container">
    <h1>MUUH LAB CONTROL CENTER</h1>

    <div class="tabs">
        <button class="tab-btn active" onclick="openTab(event, 'movies')">🎬 Content</button>
        <button class="tab-btn" onclick="openTab(event, 'actors')">🎭 Actors</button>
        <button class="tab-btn" onclick="openTab(event, 'podcasts')">🎙️ Podcasts</button>
        <button class="tab-btn" onclick="openTab(event, 'manage')">⚙️ Manage</button>
    </div>

    <div id="movies" class="tab-content active">
        <h3>Upload Video</h3>
        <div class="form-group"><label>Title</label><input type="text" id="vTitle"></div>
        <div class="form-group"><label>Category</label><select id="vCategory"><option value="movie">Movie</option><option value="series">Series</option><option value="shorts">Shorts</option></select></div>
        <div class="form-group"><label>Thumbnail URL</label><input type="text" id="vThumb"></div>
        <div class="form-group"><label>Video Link</label><input type="text" id="vLink"></div>
        <button class="submit-btn" onclick="uploadContent()">PANDISHA CONTENT</button>
    </div>

    <div id="actors" class="tab-content">
        <h3>Sajili Msanii</h3>
        <div class="form-group"><label>Full Name</label><input type="text" id="aName"></div>
        <div class="form-group"><label>Nickname (Mf: Goblin)</label><input type="text" id="aNick"></div>
        <div class="form-group"><label>TikTok Username (Bila @)</label><input type="text" id="aUser"></div>
        <div class="form-group"><label>WhatsApp Number (Mf: 255767...)</label><input type="text" id="aPhone"></div>
        <div class="form-group"><label>Profile Image URL</label><input type="text" id="aImage"></div>
        <div class="form-group"><label>Role (Mf: Director, Actor n.k)</label><input type="text" id="aRole"></div>
        
        <div class="form-group">
            <label>Latest Works (Weka Link za picha, zitenganishe kwa koma , )</label>
            <textarea id="aWorks" rows="3" placeholder="Link1, Link2, Link3..."></textarea>
        </div>
        
        <button class="submit-btn" onclick="uploadActor()">SAJILI MSANII KIKAMILIFU</button>
    </div>

    <div id="podcasts" class="tab-content">
        <h3>Upload Podcast</h3>
        <div class="form-group"><label>Title</label><input type="text" id="pTitle"></div>
        <div class="form-group"><label>Cover URL</label><input type="text" id="pCover"></div>
        <div class="form-group"><label>Audio/Video Link</label><input type="text" id="pLink"></div>
        <button class="submit-btn" onclick="uploadPodcast()">WEKA PODCAST</button>
    </div>

    <div id="manage" class="tab-content">
        <h3>Dhibiti Data Zako</h3>
        <div id="manage-list">
            <p style="color:#888; text-align:center;">Inapakia...</p>
        </div>
    </div>

    <a href="index.html" class="back-home">⬅️ Rudi Kwenye Web</a>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAlbRzPaXf4Tw_f9oFM39Ca4Un0GsyvFeI",
        authDomain: "muul-lab.firebaseapp.com",
        databaseURL: "https://muul-lab-default-rtdb.firebaseio.com",
        projectId: "muul-lab",
        storageBucket: "muul-lab.firebasestorage.app",
        messagingSenderId: "289981524698",
        appId: "1:289981524698:web:f58c296609ca0bd4d253e3"
    };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    function openTab(evt, tabId) {
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        evt.currentTarget.classList.add('active');
        if(tabId === 'manage') loadManageList();
    }

    // UPLOAD ACTOR (IMEBORESHWA KWA LATEST WORKS)
    function uploadActor() {
        const worksInput = document.getElementById('aWorks').value;
        // Tenganisha link kwa koma na tengeneza Array
        const worksArray = worksInput ? worksInput.split(',').map(link => link.trim()) : [];

        const data = {
            name: document.getElementById('aName').value,
            nickname: document.getElementById('aNick').value,
            username: document.getElementById('aUser').value,
            phone: document.getElementById('aPhone').value,
            imageUrl: document.getElementById('aImage').value,
            role: document.getElementById('aRole').value,
            works: worksArray, // Hapa ndipo picha za kishua zinaingia
            ratings: { total_points: 0, count: 0 }
        };

        if(!data.name || !data.imageUrl) {
            alert("Jina na Picha ya Profile ni lazima!");
            return;
        }

        database.ref('actors').push(data).then(() => { 
            alert('Safi! Msanii na kazi zake zimesajiliwa.'); 
            location.reload(); 
        });
    }

    function uploadContent() {
        const data = {
            title: document.getElementById('vTitle').value,
            category: document.getElementById('vCategory').value,
            thumb: document.getElementById('vThumb').value,
            link: document.getElementById('vLink').value
        };
        database.ref('videos').push(data).then(() => { alert('Safi! Content imepanda.'); location.reload(); });
    }

    function uploadPodcast() {
        const data = {
            title: document.getElementById('pTitle').value,
            coverUrl: document.getElementById('pCover').value,
            link: document.getElementById('pLink').value
        };
        database.ref('podcasts').push(data).then(() => { alert('Safi! Podcast imewekwa.'); location.reload(); });
    }

  function loadManageList() {
    const listDiv = document.getElementById('manage-list');
    listDiv.innerHTML = "<p style='color:var(--gold);'>Inapakia data za MUUH LAB...</p>";

    let htmlContent = "";

    // 1. SOMA VIDEOS (Movies & Shorts)
    database.ref('videos').once('value', (vSnap) => {
        htmlContent += `<h4 style="color:var(--gold); border-bottom:1px solid #333; padding-bottom:5px;">🎬 VIDEOS (MOVIES & SHORTS)</h4>`;
        if (vSnap.exists()) {
            vSnap.forEach((vChild) => {
                const v = vChild.val();
                htmlContent += `
                    <div class="manage-item" style="display:flex; justify-content:space-between; align-items:center; background:#111; padding:10px; margin-bottom:5px; border-radius:8px;">
                        <span style="font-size:0.85rem;">${v.title} <br><small style="color:#666;">${v.category || 'video'}</small></span>
                        <button class="del-btn" style="background:#ff4444; color:white; border:none; padding:5px 10px; border-radius:4px; cursor:pointer;" onclick="deleteItem('videos', '${vChild.key}')">FUTA</button>
                    </div>`;
            });
        } else {
            htmlContent += `<p style="font-size:12px; color:#555;">Hakuna video iliyosajiliwa.</p>`;
        }

        // 2. SOMA WASANII (ACTORS)
        database.ref('actors').once('value', (aSnap) => {
            htmlContent += `<h4 style="color:var(--gold); border-bottom:1px solid #333; padding-bottom:5px; margin-top:20px;">🎭 WASANII (ACTORS)</h4>`;
            if (aSnap.exists()) {
                aSnap.forEach((aChild) => {
                    const a = aChild.val();
                    htmlContent += `
                        <div class="manage-item" style="display:flex; justify-content:space-between; align-items:center; background:#111; padding:10px; margin-bottom:5px; border-radius:8px;">
                            <span style="font-size:0.85rem;">${a.name}</span>
                            <button class="del-btn" style="background:#ff4444; color:white; border:none; padding:5px 10px; border-radius:4px; cursor:pointer;" onclick="deleteItem('actors', '${aChild.key}')">FUTA</button>
                        </div>`;
                });
            } else {
                htmlContent += `<p style="font-size:12px; color:#555;">Hakuna msanii aliyesajiliwa.</p>`;
            }

            // 3. SOMA MAOMBI YA KAZI (BOOKINGS)
            database.ref('bookings').once('value', (bSnap) => {
                htmlContent += `<h4 style="color:var(--gold); border-bottom:1px solid #333; padding-bottom:5px; margin-top:20px;">💼 BOOKINGS (PRIVATE)</h4>`;
                if (bSnap.exists()) {
                    bSnap.forEach((bChild) => {
                        const b = bChild.val();
                        htmlContent += `
                            <div class="manage-item" style="background:#111; padding:10px; margin-bottom:5px; border-radius:8px;">
                                <p style="font-size:0.85rem; margin:0;"><b>Mteja:</b> ${b.clientName}</p>
                                <p style="font-size:0.75rem; color:#888; margin:5px 0;"><b>Kazi:</b> ${b.jobDescription}</p>
                                <button class="del-btn" style="background:#444; color:white; border:none; padding:5px 10px; border-radius:4px; cursor:pointer; width:100%;" onclick="deleteItem('bookings', '${bChild.key}')">ONDOA MAOMBI</button>
                            </div>`;
                    });
                } else {
                    htmlContent += `<p style="font-size:12px; color:#555;">Hakuna booking mpya.</p>`;
                }

                // WEKA KILA KITU KWENYE SCREEN
                listDiv.innerHTML = htmlContent;
            });
        });
    });
}

// Function ya kufuta (Hakikisha unayo hii pia)
function deleteItem(path, id) {
    if (confirm("Je, una uhakika unataka kufuta hii?")) {
        database.ref(path + '/' + id).remove().then(() => {
            alert("Imefutwa! ✅");
            loadManageList(); // Refresh list
        });
    }
}
</script>
</body>
</html>
